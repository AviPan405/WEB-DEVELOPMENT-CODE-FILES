<!DOCTYPE html>
<html>
    <head>
            <title> Registration Form </title>
            </head> 
    <body>
        <header>
            <h1> Registration Form </h1>
            <form>
                <fieldset>
                    <legend> Personal Information </legend>
                    <label> First Name: <input type="text" name="firstName" required> </label><br>
                    <label> Last Name: <input type="text" name="lastName" required> </label><br>
                    <label> Email: <input type="email" name="email" required> </label><br>
                    <label> Password: <input type="password" name="password" required> </label><br>
                    <label> Date of Birth: <input type="date" name="dob" required> </label><br>
                    <label> Phone Number: <input type="tel" name="phone" required> </label><br>
                    <label for="vol">Choose a number (between 0 and 100):</label>
                    <input type="range" id="vol" name="vol" min="0" max="100"><br>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">

                </fieldset>           
             </form>
