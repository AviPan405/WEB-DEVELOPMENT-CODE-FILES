<!DOCTYPE html>
<html>
    <head>
        <title> CSS AND IT'S SELECTORS</title>
        <style> 
            h1{color: rgb(77, 19, 131);}
            #heading{background-color: rgb(189, 121, 208);}
            .p1{border:1px dotted black;}
            *{background-color: rgb(237, 167, 243);}
            #p3,#p4,#p5{font-family: Georgia, 'Times New Roman', Times, serif;}
            h5{border: 2px dotted rgb(27, 7, 114); font-family:Georgia, 'Times New Roman', Times, serif;}
        </style>
    </head>
    <body>
        <h1> CSS and its Selectors</h1>
        <p id="heading">  There are 5 diffrent types of selectors.</p>
        <p class="p1"> Element selector</p>
        <p class="p1"> ID selector</p>
        <p id="p3"> Class selector</p>
        <p id="p4"> Universal selector</p>
        <p id="p5"> Group selector</p>
        <h5> That's all for today! </h5>
    </body>
</html>
