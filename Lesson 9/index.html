<!DOCTYPE html>
<html> 
    <head>
        <title> Text Styling in CSS</title>
        <style>
           #p1{
            text-decoration: underline;
           }
           #p2{
            text-decoration:overline;
           }
           #p3{
            text-decoration: line-through;
           }
           #p4{
            text-decoration: underline overline;
           }
           #p5{
            text-transform: uppercase;
           }
           #p6{
            text-transform: lowercase;
           }
           #p7{
            text-transform: capitalize;
           }
           #p8{
            text-transform: none;
           }
           #p9{
            text-align: left ;
           }
           #p10{
            text-align: right;
           }
           #p11{
            text-align: center;
           }
           h1{
            text-shadow: 2px 3px 2px purple;
           }
          #heading1{
            box-shadow: 12px 13px 22px purple;
           }
           #heading2{
            font-family: Georgia, 'Times New Roman', Times, serif;
           }
           #heading3{
            font-family: 'Cursive', 'Brush Script MT', cursive;
            font-size: 23px;
           }
        </style>
    </head>
    <body>
        <h1> Text Styling in CSS</h1>
        <h3 id="heading1"> 1. Text Decoration</h3>
        <p id="p1"> a. Underline</p>
        <p id="p2"> b. Overline</p>
        <p id="p3"> c. Line-through</p>
        <p id="p4"> d. Underline Overline </p>
        <h3 id="heading2"> 2. Text Transform </h3>
        <p id="p5"> a. Uppercase </p>
        <p id="p6"> b. Lowercase </p>
        <p id="p7"> c. capitalize</p>
        <p id="p8"> d. None </p>
        <h3 id="heading3"> 3. Text Indent </h3>
        <p id="p9"> a. Left</p>
        <p id="p10"> b. Right </p>
        <p id="p11"> c. Center </p>
     </body>
    </html>
